<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMCPivotEdge — NSE Technical Screener | Day Trade & Scalp Levels</title>
  <style>
    /* Plain, Institutional Terminal Theme */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0a;
      color: #d1d5db;
      margin: 0;
      padding: 30px;
      font-size: 14px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Top Titles & Hints */
    .main-header {
      margin-bottom: 25px;
    }

    .main-header h1 {
      font-size: 24px;
      color: #58a6ff;
      margin: 0 0 5px 0;
      letter-spacing: 0.5px;
    }

    .main-header .subtitle {
      color: #8b949e;
      margin: 0;
      font-size: 14px;
    }

    .hint {
      color: #8b949e;
      font-size: 13px;
      margin: -15px 0 25px 0;
    }

    .hint b {
      color: #d1d5db;
    }
    /* Search Bar Area */
    .search-area {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      display: inline-block;
    }

    input {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 12px;
      font-size: 16px;
      width: 250px;
      text-transform: uppercase;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    input:focus {
      border-color: #58a6ff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
    }

    .search-area button {
      background: #238636;
      color: #fff;
      border: none;
      padding: 9px 16px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s ease;
    }

    .search-area button:hover {
      background: #2ea043;
    }

    .search-area button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    /* Autocomplete Dropdown styling */
    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      width: 100%;
      min-width: 280px;
      background: rgba(22, 22, 29, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      max-height: 260px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
      transition: background 0.2s ease;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover, .autocomplete-item.active {
      background: rgba(88, 166, 255, 0.12);
    }

    .autocomplete-ticker {
      font-weight: 600;
      color: #58a6ff;
      font-size: 12px;
      background: rgba(88, 166, 255, 0.1);
      padding: 3px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .autocomplete-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hotlist Pills styling */
    .hotlist-container {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .hotlist-label {
      font-size: 12px;
      color: #8b949e;
      font-weight: 500;
      margin-right: 4px;
    }

    .hotlist-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #c9d1d9;
      padding: 6px 12px;
      border-radius: 14px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .hotlist-pill:hover {
      background: rgba(88, 166, 255, 0.1);
      border-color: rgba(88, 166, 255, 0.3);
      color: #58a6ff;
    }

    .groww-link {
      margin-left: 5px;
      padding: 0 4px;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .groww-link:hover {
      color: #00d09c !important;
      background: rgba(0, 208, 156, 0.15);
    }

    #status {
      margin-bottom: 20px;
      color: #8b949e;
    }

    .error {
      color: #ff6b6b !important;
    }

    /* Header / Price Block */
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2px solid #333;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .ticker-info h2 {
      margin: 0 0 5px 0;
      font-size: 28px;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .ticker-info span {

      font-size: 14px;
    }

    .price-info {
      text-align: right;
    }

    .price-info .ltp {
      font-size: 32px;
      font-weight: bold;

    }

    .price-info .change {

    /* Data Tables */
    h3 {
      color: #ffffff;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 30px 0 10px 0;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #1f1f1f;
      vertical-align: middle;
    }

    th {
      color: #8b949e;

    .col-metric {

    .col-value {

      font-size: 15px;

    }

    .col-logic {
      color: #a1a1aa;
      line-height: 1.4;
    }

    /* Column widths for 3-column tables to optimize horizontal spacing */
    .three-col-table th.col-metric,
    .three-col-table td.col-metric {

    .three-col-table th.col-value,

    .three-col-table th.col-logic,
    .three-col-table td.col-logic {

    /* Monospaced Numeric Fonts */
    .num-mono {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: -0.2px;

    /* Premium Micro Semantic Badges */
    .pill-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.2;
      vertical-align: middle;

    .pill-badge.green {
      background-color: rgba(74, 222, 128, 0.12);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .pill-badge.red {
      background-color: rgba(248, 113, 113, 0.12);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .pill-badge.amber {
      background-color: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    .pill-badge.blue {
      background-color: rgba(96, 165, 250, 0.12);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.2);
    }

    .pill-badge.white {
      background-color: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* CSS Tooltip Implementation */
    .tooltip {
      position: relative;
      cursor: help;
      border-bottom: 1px dashed #444;
      padding-bottom: 1px;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 280px;
      background-color: #161b22;
      color: #c9d1d9;
      text-align: left;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 14px;
      position: absolute;
      z-index: 100;
      bottom: 130%;
      /* Position above target */
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      font-size: 12px;
      line-height: 1.45;
      font-weight: normal;
      pointer-events: none;
      white-space: normal;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }

    /* Functional Colors */
    .green {
      color: #4ade80;
    }

    .red {
      color: #f87171;
    }

    .amber {
      color: #fbbf24;
    }

    .blue {
      color: #60a5fa;
    }

    .white {
      color: #ffffff;
    }

    /* Mini Grid for Session Data */
    .session-grid {
      display: grid;

      gap: 15px 30px;

    .session-grid div {

    .session-grid span.lbl {

    .session-grid span.val {

    /* Highlight Row for Verdict */
    .row-verdict td {
      background-color: #111827;
      border-top: 1px solid #333;

      padding-bottom: 16px;
    }

    /* Info Box */
    .info-box {
      background: #111827;
      border-left: 4px solid #58a6ff;
      padding: 16px 20px;
      margin-top: 40px;
      border-radius: 4px;
    }

    .info-box h4 {
      margin: 0 0 10px 0;
      color: #e5e7eb;
      font-size: 14px;
      text-transform: uppercase;
    }

    .info-box p {
      margin: 0 0 8px 0;
      color: #a1a1aa;
      font-size: 13px;

    }

    .info-box ul {
      margin: 0 0 12px 0;
      padding-left: 20px;
      color: #a1a1aa;
      font-size: 13px;

    .info-box li {

    /* Warning Footer */
    .footer-warning {
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #333;
      color: #8b949e;
      font-size: 13px;
      text-align: center;
    }

    /* Tabs Navigation */
    .tabs-nav {
      display: flex;
      border-bottom: 1px solid #222;
      margin: 25px 0;
      gap: 10px;
    }

    .tab-btn {
      background: transparent;
      color: #8b949e;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
    }

    .tab-btn:hover {
      color: #ffffff;
    }

    .tab-btn.active {
      color: #58a6ff;

    }

    .tab-content {
      display: none;

    .tab-content.active {

    .badge-experimental {
      background-color: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(245, 158, 11, 0.3);
      margin-left: 8px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Timeframe Toggle */
    .timeframe-toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      background: #111827;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #222;
    }

    .timeframe-toggle-container span {
      color: #8b949e;
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-group {
      display: flex;
      gap: 5px;
    }

    .toggle-btn {
      background: #1f1f1f;

      border: 1px solid #333;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;

      border-radius: 3px;

    .toggle-btn.active {
      background: #58a6ff;

      border-color: #58a6ff;

  </style>

<body>

  <div class="container">
    <div class="main-header">
      <h1>📊 SMCPivotEdge</h1>
      <p class="subtitle">Institutional Grade Actionable Day Trade &amp; Scalp Levels for NSE</p>
    </div>

    <div class="search-area">
      <div class="search-wrapper">
        <input id="sym" type="text" placeholder="TICKER (e.g. AETHER)" autocomplete="off" />
        <div id="autocomplete-suggestions" class="autocomplete-dropdown"></div>
      </div>
      <button id="btn" onclick="fetchStock()">Run Analysis</button>
    </div>

    <div class="hotlist-container" style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
      <span id="hotlist-title" class="hotlist-label" style="font-weight: 600; color: #8b949e; font-size: 12px; margin-right: 4px; white-space: nowrap;">Quick Access:</span>
      <div id="hotlist-pills" style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
        <button class="hotlist-pill" onclick="loadHotlist('AETHER')">AETHER<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'AETHER')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('IREDA')">IREDA<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'IREDA')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('HDFCBANK')">HDFCBANK<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'HDFCBANK')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('ITC')">ITC<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'ITC')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('SBIN')">SBIN<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'SBIN')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('TCS')">TCS<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'TCS')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('INFY')">INFY<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'INFY')">↗</span></button>
        <button class="hotlist-pill" onclick="loadHotlist('RELIANCE')">RELIANCE<span class="groww-link" title="Open on Groww" onclick="openGroww(event, 'RELIANCE')">↗</span></button>
      </div>
    </div>

    <div id="status">Ready. Type a ticker and press enter.</div>
    <div id="output"></div>
  </div>

  <script>
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    let activeStockData = null;
    let selectedTimeframe = '1d';

    // Autocomplete & Hotlist Search Logic
    const suggestionsEl = () => document.getElementById('autocomplete-suggestions');
    let activeSuggestionIndex = -1;
    let currentSuggestions = [];
    let localNseStocks = [];
    let allNseStocks = [];

    function loadLocalStocks() {
      localNseStocks = window.LOCAL_NSE_STOCKS || [];
      allNseStocks = window.ALL_NSE_STOCKS || [];
    }

    const DEFAULT_STOCKS = ['AETHER', 'IREDA', 'HDFCBANK', 'ITC', 'SBIN', 'TCS', 'INFY', 'RELIANCE'];

    function getQuickAccessList() {
      try {
        const saved = localStorage.getItem('smc_quick_access_pills');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            return parsed;
          }
        }
      } catch (e) {
        console.error('Failed to load quick access recents:', e);
      }
      return [...DEFAULT_STOCKS];
    }

    function saveQuickAccessList(list) {
      try {
        localStorage.setItem('smc_quick_access_pills', JSON.stringify(list));
      } catch (e) {
        console.error('Failed to save quick access recents:', e);
      }
    }

    function addSearchedStockToQuickAccess(symbol) {
      const cleanSym = symbol.trim().toUpperCase().replace(/\.NS$/, '');
      if (!cleanSym) return;
      
      let currentList = getQuickAccessList();
      currentList = currentList.filter(sym => sym !== cleanSym);
      currentList.unshift(cleanSym);
      currentList = currentList.slice(0, 8);
      
      saveQuickAccessList(currentList);
    }

    // Dynamic Sector & Peer Stock Scanner (Zero-Hardcoding, Emoji-Free UI, DTOS sorted)
    let scannerTickers = [];
    let scannerIntervalId = null;

    async function getIndustryForSymbol(symbol) {
      const cleanSym = symbol.trim().toUpperCase().replace(/\.NS$/, '');
      
      // 1. Check if the symbol is in our all stocks database (instant)
      const stock = allNseStocks.find(s => s.symbol.toUpperCase() === cleanSym);
      if (stock && stock.industry && stock.industry !== 'Equity') {
        return stock.industry;
      }
      
      // 2. Check local leaders list (instant)
      const leader = localNseStocks.find(s => s.symbol.toUpperCase() === cleanSym);
      if (leader && leader.industry) {
        return leader.industry;
      }
      
      // 3. Fallback to Search API for mid/small-caps to find their industry sector
      try {
        const searchUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(cleanSym + '.NS')}&quotesCount=1&newsCount=0`;
        const response = await fetch(PROXY + encodeURIComponent(searchUrl));
        if (response.ok) {
          const data = await response.json();
          if (data && data.quotes && data.quotes[0]) {
            const q = data.quotes[0];
            return q.industryDisp || q.industry || q.sectorDisp || q.sector || 'Equity';
          }
        }
      } catch (e) {
        console.error('Failed to fetch industry for non-leader:', e);
      }
      return 'Equity';
    }

    async function updateScannerTickers(symbol) {
      if (!symbol) return;
      const cleanSym = symbol.trim().toUpperCase().replace(/\.NS$/, '');
      
      // Get the industry sector
      const industry = await getIndustryForSymbol(cleanSym);
      
      // 1. Find all matching stocks in our comprehensive nse-all-stocks list
      let allPeers = allNseStocks.filter(s => s.industry && s.industry.toLowerCase() === industry.toLowerCase()).map(s => s.symbol.toUpperCase());
      
      // Also filter localNseStocks for the same industry (in case of different spelling/source)
      let leaderPeers = localNseStocks.filter(s => s.industry && s.industry.toLowerCase() === industry.toLowerCase()).map(s => s.symbol.toUpperCase());
      
      // Combine them to get a unique list of all candidates
      let uniquePeers = Array.from(new Set([...leaderPeers, ...allPeers]));
      
      // 2. Exclude the active stock itself from peers
      uniquePeers = uniquePeers.filter(sym => sym !== cleanSym);
      
      // 3. Prioritize leader stocks (from localNseStocks) first
      const leaderSymbols = new Set(localNseStocks.map(s => s.symbol.toUpperCase()));
      const sortedPeers = uniquePeers.sort((a, b) => {
        const aIsLeader = leaderSymbols.has(a) ? 1 : 0;
        const bIsLeader = leaderSymbols.has(b) ? 1 : 0;
        return bIsLeader - aIsLeader; // leaders first
      });
      
      // 4. Limit the scan list size to top 40 candidate peers to save network bandwidth and run fast
      scannerTickers = sortedPeers.slice(0, 40);
      
      // Update the scanner row label with the current sector
      const titleEl = document.getElementById('hotlist-title');
      if (titleEl) {
        titleEl.textContent = `Sector Peers (${industry}):`;
      }
    }

    async function fetchScannerData() {
      if (scannerTickers.length === 0) return [];
      
      // Split into parallel safe batches of 20 to avoid Yahoo server-side URL size limits
      const batches = [];
      for (let i = 0; i < scannerTickers.length; i += 20) {
        batches.push(scannerTickers.slice(i, i + 20));
      }
      
      const fetchPromises = batches.map(async (batch) => {
        const symbolsWithNs = batch.map(s => encodeURIComponent(s + '.NS'));
        const sparkUrl = `https://query1.finance.yahoo.com/v7/finance/spark?symbols=${symbolsWithNs.join(',')}&range=1d&interval=5m`;
        
        try {
          const response = await fetch(PROXY + encodeURIComponent(sparkUrl));
          if (response.ok) {
            const data = await response.json();
            if (data && data.spark && data.spark.result) {
              return data.spark.result;
            }
          }
        } catch (e) {
          console.error('Failed to fetch scanner batch:', e);
        }
        return [];
      });
      
      try {
        const batchResults = await Promise.all(fetchPromises);
        return batchResults.flat();
      } catch (e) {
        console.error('Failed to resolve all scanner batches:', e);
        return [];
      }
    }

    function processAndRenderScanner(results) {
      const pillsContainer = document.getElementById('hotlist-pills');
      if (!pillsContainer || !results || results.length === 0) return;
      
      const processedStocks = [];
      
      results.forEach(res => {
        if (!res) return;
        const symbol = res.symbol.replace(/\.NS$/, '');
        const meta = res.response && res.response[0] && res.response[0].meta;
        if (!meta) return;
        
        const price = meta.regularMarketPrice;
        const prevClose = meta.previousClose || meta.chartPreviousClose;
        const high = meta.regularMarketDayHigh;
        const low = meta.regularMarketDayLow;
        const volume = meta.regularMarketVolume || 0;
        
        if (!price || !prevClose || !high || !low) return;
        
        const changePercent = ((price - prevClose) / prevClose) * 100;
        const rangePercent = prevClose ? (((high - low) / prevClose) * 100) : 0;
        const valueTraded = price * volume;
        
        const distToHigh = ((high - price) / price) * 100;
        const distToLow = ((price - low) / price) * 100;
        const distToPdc = (Math.abs(price - prevClose) / prevClose) * 100;
        
        let setupName = "Neutral";
        let setupBadge = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(1)}%`;
        let setupPriority = 5; // Lowest
        let borderStyle = 'rgba(255, 255, 255, 0.06)';
        let textColor = '#c9d1d9';
        
        // 1. Breakouts / Breakdowns (Rank 1)
        if (distToHigh <= 0.1 && high > prevClose) {
          setupName = "Day High BO";
          setupBadge = "BO";
          setupPriority = 1;
          borderStyle = 'rgba(74, 222, 128, 0.35)';
          textColor = '#4ade80';
        } else if (distToLow <= 0.1 && low < prevClose) {
          setupName = "Day Low BD";
          setupBadge = "BD";
          setupPriority = 1;
          borderStyle = 'rgba(248, 113, 113, 0.35)';
          textColor = '#f87171';
        }
        // 2. Testing PDC (Rank 2)
        else if (distToPdc <= 0.15) {
          setupName = "Testing PDC";
          setupBadge = "PDC";
          setupPriority = 2;
          borderStyle = 'rgba(251, 191, 36, 0.35)';
          textColor = '#fbbf24';
        }
        // 3. Volatility Squeeze (Rank 3)
        else if (rangePercent < 0.8) {
          setupName = "Squeeze";
          setupBadge = "SQZ";
          setupPriority = 3;
          borderStyle = 'rgba(88, 166, 255, 0.35)';
          textColor = '#58a6ff';
        }
        // 4. Momentum Trend (Rank 4)
        else if (changePercent >= 1.5) {
          setupName = "Bullish Trend";
          setupBadge = "BULL";
          setupPriority = 4;
          borderStyle = 'rgba(74, 222, 128, 0.25)';
          textColor = '#4ade80';
        } else if (changePercent <= -1.5) {
          setupName = "Bearish Trend";
          setupBadge = "BEAR";
          setupPriority = 4;
          borderStyle = 'rgba(248, 113, 113, 0.25)';
          textColor = '#f87171';
        }
        
        processedStocks.push({
          symbol,
          price,
          changePercent,
          rangePercent,
          valueTraded,
          setupName,
          setupBadge,
          setupPriority,
          borderStyle,
          textColor
        });
      });
      
      if (processedStocks.length === 0) return;

      // Sort by setup priority first, then sub-sort by intraday trading turnover (valueTraded) descending
      processedStocks.sort((a, b) => {
        if (a.setupPriority !== b.setupPriority) {
          return a.setupPriority - b.setupPriority;
        }
        return b.valueTraded - a.valueTraded;
      });
      
      const top20 = processedStocks.slice(0, 20);
      
      pillsContainer.innerHTML = '';
      top20.forEach(stock => {
        const btn = document.createElement('button');
        btn.className = 'hotlist-pill';
        btn.onclick = () => loadHotlist(stock.symbol);
        
        // Apply dynamic soft border styling directly to the button
        btn.style.borderColor = stock.borderStyle;
        btn.style.boxShadow = `0 0 4px ${stock.borderStyle.replace('0.35', '0.05').replace('0.25', '0.03')}`;
        
        btn.innerHTML = `
          <span>${stock.symbol}</span>
          <span style="font-size: 10px; color: ${stock.textColor}; font-weight: 700; letter-spacing: 0.3px; margin-left: 2px;">${stock.setupBadge}</span>
          <span class="groww-link" title="Open on Groww" onclick="openGroww(event, '${stock.symbol}')">↗</span>
        `;
        pillsContainer.appendChild(btn);
      });
    }

    async function runScanner() {
      const data = await fetchScannerData();
      processAndRenderScanner(data);
    }

    async function initScanner() {
      const input = document.getElementById('sym');
      const activeSym = input ? input.value.trim() : '';
      
      if (!activeSym) {
        // Clear background refresher interval to save network resources
        if (scannerIntervalId) {
          clearInterval(scannerIntervalId);
          scannerIntervalId = null;
        }
        
        // Revert label to original 'Quick Access:' and restore default pills
        const titleEl = document.getElementById('hotlist-title');
        if (titleEl) {
          titleEl.textContent = 'Quick Access:';
        }
        
        const pillsContainer = document.getElementById('hotlist-pills');
        if (pillsContainer) {
          pillsContainer.innerHTML = '';
          const currentList = getQuickAccessList();
          currentList.forEach(sym => {
            const btn = document.createElement('button');
            btn.className = 'hotlist-pill';
            btn.onclick = () => loadHotlist(sym);
            btn.innerHTML = `
              <span>${sym}</span>
              <span class="groww-link" title="Open on Groww" onclick="openGroww(event, '${sym}')">↗</span>
            `;
            pillsContainer.appendChild(btn);
          });
        }
        return;
      }
      
      await updateScannerTickers(activeSym);
      await runScanner();
      
      if (scannerIntervalId) clearInterval(scannerIntervalId);
      
      scannerIntervalId = setInterval(() => {
        // Only run refreshes during active market hours to save API bandwidth
        const date = new Date();
        const options = { timeZone: 'Asia/Kolkata', hour12: false, hour: '2-digit', minute: '2-digit', weekday: 'short' };
        const formatter = new Intl.DateTimeFormat('en-US', options);
        const parts = formatter.formatToParts(date);
        let hour = 0, minute = 0, weekday = 'Mon';
        parts.forEach(p => {
          if (p.type === 'hour') hour = parseInt(p.value, 10);
          if (p.type === 'minute') minute = parseInt(p.value, 10);
          if (p.type === 'weekday') weekday = p.value;
        });
        const timeVal = hour * 60 + minute;
        const isWeekend = (weekday === 'Sat' || weekday === 'Sun');
        const isMarketHours = !isWeekend && timeVal >= 540 && timeVal <= 930;
        
        if (isMarketHours) {
          runScanner();
        }
      }, 120000);
    }

    function loadHotlist(ticker) {
      const input = document.getElementById('sym');
      if (input) {
        input.value = ticker;
        closeSuggestions();
        fetchStock();
      }
    }

    async function openGroww(event, symbol) {
      if (event) {
        event.stopPropagation();
      }
      const cleanSym = symbol.trim().toUpperCase().replace(/\.NS$/, '');
      
      // 1. Open loading window immediately to bypass popup blocker
      const newWindow = window.open('', '_blank');
      if (newWindow) {
        newWindow.document.write(`
          <html>
            <head>
              <title>Redirecting...</title>
              <style>
                body {
                  background: #0a0a0a;
                  color: #8b949e;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  height: 100vh;
                  margin: 0;
                }
                .spinner {
                  border: 3px solid rgba(0, 208, 156, 0.1);
                  width: 36px;
                  height: 36px;
                  border-radius: 50%;
                  border-left-color: #00d09c;
                  animation: spin 1s linear infinite;
                  margin-bottom: 15px;
                }
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
              </style>
            </head>
            <body>
              <div class="spinner"></div>
              <div style="font-size: 14px; font-weight: 500;">Locating ${cleanSym} on Groww...</div>
            </body>
          </html>
        `);
      }

      // 2. Pre-calculate fallback name-based slug
      let fallbackSlug = cleanSym.toLowerCase();
      let stock = null;
      if (window.ALL_NSE_STOCKS) {
        stock = window.ALL_NSE_STOCKS.find(s => s.symbol.toUpperCase() === cleanSym);
      }
      if (!stock && window.LOCAL_NSE_STOCKS) {
        stock = window.LOCAL_NSE_STOCKS.find(s => s.symbol.toUpperCase() === cleanSym);
      }
      if (stock && stock.name) {
        let name = stock.name.toLowerCase();
        name = name.replace(/[()]/g, ' ');
        name = name.replace(/&/g, ' ');
        name = name.replace(/\blimited\b/g, 'ltd');
        name = name.replace(/[^a-z0-9\s-]/g, '');
        fallbackSlug = name.trim().replace(/[\s-]+/g, '-');
      }

      // 3. Try to dynamically resolve the Groww search ID at runtime via proxy
      try {
        const searchUrl = `https://groww.in/v1/api/search/v3/query/global/st_query?query=${encodeURIComponent(cleanSym)}&web=true`;
        const response = await fetch(PROXY + encodeURIComponent(searchUrl));
        if (response.ok) {
          const resData = await response.json();
          const content = resData && resData.data && resData.data.content;
          if (content && content.length > 0) {
            let matchedSlug = null;
            // First try exact NSE code match
            for (let item of content) {
              if (item.entity_type === 'Stocks' && item.nse_scrip_code === cleanSym) {
                matchedSlug = item.search_id;
                break;
              }
            }
            // Fallback to first Stocks item
            if (!matchedSlug) {
              for (let item of content) {
                if (item.entity_type === 'Stocks') {
                  matchedSlug = item.search_id;
                  break;
                }
              }
            }
            if (matchedSlug) {
              const url = `https://groww.in/stocks/${matchedSlug}`;
              if (newWindow) {
                newWindow.location.href = url;
              } else {
                window.open(url, '_blank');
              }
              return;
            }
          }
        }
      } catch (e) {
        console.error('Failed to resolve Groww slug dynamically:', e);
      }

      // 4. Fallback if search fails or times out
      const url = `https://groww.in/stocks/${fallbackSlug}`;
      if (newWindow) {
        newWindow.location.href = url;
      } else {
        window.open(url, '_blank');
      }
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function highlightText(text, query) {
      if (!query) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      const part = text.substring(idx, idx + query.length);
      return text.substring(0, idx) + `<strong>${part}</strong>` + text.substring(idx + query.length);
    }

    async function fetchSuggestions(query) {
      const el = suggestionsEl();
      if (!el) return;
      
      const cleanQuery = query.trim();
      if (!cleanQuery) {
        closeSuggestions();
        return;
      }
      
      const lowerQuery = cleanQuery.toLowerCase();
      const matchesMap = new Map();
      
      function addMatch(stock, score) {
        const symKey = stock.symbol.toUpperCase();
        const existing = matchesMap.get(symKey);
        if (!existing || score < existing.score) {
          matchesMap.set(symKey, {
            symbol: symKey + '.NS',
            longname: stock.name,
            industryDisp: stock.industry || 'Equity',
            score: score
          });
        }
      }
      
      // 1. Search leaders list (highest priority, lower score is better)
      localNseStocks.forEach(stock => {
        const symbol = stock.symbol.toLowerCase();
        const name = stock.name.toLowerCase();
        
        let score = -1;
        if (symbol === lowerQuery) {
          score = 0; // Exact symbol match
        } else if (symbol.startsWith(lowerQuery)) {
          score = 2; // Symbol starts with
        } else if (name.startsWith(lowerQuery)) {
          score = 4; // Name starts with
        } else if (symbol.includes(lowerQuery)) {
          score = 6; // Symbol contains
        } else if (name.includes(lowerQuery)) {
          score = 8; // Name contains
        }
        
        if (score !== -1) {
          addMatch(stock, score);
        }
      });
      
      // 2. Search general list (secondary priority, offset scores by +1)
      allNseStocks.forEach(stock => {
        const symbol = stock.symbol.toLowerCase();
        const name = stock.name.toLowerCase();
        
        let score = -1;
        if (symbol === lowerQuery) {
          score = 1; // Exact symbol match
        } else if (symbol.startsWith(lowerQuery)) {
          score = 3; // Symbol starts with
        } else if (name.startsWith(lowerQuery)) {
          score = 5; // Name starts with
        } else if (symbol.includes(lowerQuery)) {
          score = 7; // Symbol contains
        } else if (name.includes(lowerQuery)) {
          score = 9; // Name contains
        }
        
        if (score !== -1) {
          addMatch(stock, score);
        }
      });
      
      // Convert to array and sort by priority score
      let matches = Array.from(matchesMap.values());
      matches.sort((a, b) => a.score - b.score);
      let mergedResults = matches.slice(0, 6);
      
      // Fallback to API if we have fewer than 6 matches
      if (mergedResults.length < 6) {
        try {
          const searchUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(cleanQuery)}&quotesCount=8&newsCount=0`;
          const response = await fetch(PROXY + encodeURIComponent(searchUrl));
          if (response.ok) {
            const data = await response.json();
            if (data && data.quotes) {
              const apiQuotes = data.quotes.filter(q => q.symbol && q.symbol.endsWith('.NS'));
              
              apiQuotes.forEach(apiStock => {
                if (!mergedResults.some(r => r.symbol === apiStock.symbol)) {
                  mergedResults.push({
                    symbol: apiStock.symbol,
                    longname: apiStock.longname || apiStock.shortname || apiStock.symbol,
                    industryDisp: apiStock.industryDisp || apiStock.industry || apiStock.sectorDisp || apiStock.sector || 'Equity'
                  });
                }
              });
            }
          }
        } catch (e) {
          console.error('API Autocomplete fallback failed:', e);
        }
      }
      
      currentSuggestions = mergedResults.slice(0, 6);
      
      if (currentSuggestions.length === 0) {
        closeSuggestions();
        return;
      }
      
      renderSuggestions(cleanQuery);
    }

    function renderSuggestions(query) {
      const el = suggestionsEl();
      if (!el) return;
      el.innerHTML = '';
      activeSuggestionIndex = -1;
      
      currentSuggestions.forEach((q, idx) => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        
        const ticker = q.symbol.replace(/\.NS$/, '');
        const companyName = q.longname;
        
        const highlightedName = highlightText(companyName, query);

        item.addEventListener('click', () => {

      el.style.display = 'block';

    function selectSuggestion(idx) {

    // Math Helpers
    function calcEMA(data, period) {
      if (data.length < period) return data.at(-1) ?? 0;
      const k = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < data.length; i++) ema = data[i] * k + ema * (1 - k);
      return ema;
    }

    function calcEMAArray(data, period) {
      if (data.length < period) return [];
      const k = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const result = [ema];
      for (let i = period; i < data.length; i++) { ema = data[i] * k + ema * (1 - k); result.push(ema); }
      return result;
    }

    function calcMACD(closes, fast = 12, slow = 26, signal = 9) {
      if (closes.length < slow + signal) return { macd: 0, signal: 0, histogram: 0 };
      const ema12 = calcEMAArray(closes, fast);
      const ema26 = calcEMAArray(closes, slow);
      const offset = ema12.length - ema26.length;
      const macdLine = ema26.map((v, i) => ema12[i + offset] - v);
      const signalArr = calcEMAArray(macdLine, signal);
      const m = macdLine.at(-1), s = signalArr.at(-1);
      return { macd: m, signal: s, histogram: m - s };
    }

    function calcSupertrend(highs, lows, closes, period = 10, multiplier = 3) {
      if (closes.length < period + 2) return { value: closes.at(-1) ?? 0, direction: 'Neutral' };
      const atrs = [];
      for (let i = 1; i < closes.length; i++) {
        atrs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1])));
      }
      let smoothATR = atrs.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const smoothATRs = [smoothATR];
      for (let i = period; i < atrs.length; i++) {
        smoothATR = (smoothATR * (period - 1) + atrs[i]) / period;
        smoothATRs.push(smoothATR);
      }
      const si = period;
      let fUp = (highs[si] + lows[si]) / 2 + multiplier * smoothATRs[0];
      let fLo = (highs[si] + lows[si]) / 2 - multiplier * smoothATRs[0];
      let dir = closes[si] <= fUp ? -1 : 1;
      let st = dir === -1 ? fUp : fLo;
      for (let i = 1; i < smoothATRs.length; i++) {
        const idx = si + i;
        const bUp = (highs[idx] + lows[idx]) / 2 + multiplier * smoothATRs[i];
        const bLo = (highs[idx] + lows[idx]) / 2 - multiplier * smoothATRs[i];
        const prevFUp = fUp;
        const prevFLo = fLo;
        const prevClose = closes[idx - 1];
        fUp = (bUp < prevFUp || prevClose > prevFUp) ? bUp : prevFUp;
        fLo = (bLo > prevFLo || prevClose < prevFLo) ? bLo : prevFLo;
        if (dir === -1) {
          if (closes[idx] > fUp) {
            dir = 1;
            st = fLo;
          } else {
            st = fUp;
          }
        } else {
          if (closes[idx] < fLo) {
            dir = -1;
            st = fUp;
          } else {
            st = fLo;
          }
        }
      }
      return { value: st, direction: dir === 1 ? 'Bullish' : 'Bearish' };
    }

    function calcBollingerBands(closes, period = 20, mult = 2) {
      if (closes.length < period) return { upper: 0, middle: 0, lower: 0, width: 0, pctB: 50 };
      const sl = closes.slice(-period);
      const sma = sl.reduce((a, b) => a + b, 0) / period;
      const stdDev = Math.sqrt(sl.reduce((a, b) => a + Math.pow(b - sma, 2), 0) / period);
      const upper = sma + mult * stdDev, lower = sma - mult * stdDev;
      const ltp = closes.at(-1);
      return { upper, middle: sma, lower, width: (upper - lower) / sma * 100, pctB: (upper - lower) > 0 ? (ltp - lower) / (upper - lower) * 100 : 50 };
    }

    function calcADX(highs, lows, closes, period = 14) {
      if (closes.length < period * 2 + 1) return { adx: 0, plusDI: 0, minusDI: 0 };
      const pDMs = [], mDMs = [], trs = [];
      for (let i = 1; i < closes.length; i++) {
        const up = highs[i] - highs[i - 1], dn = lows[i - 1] - lows[i];
        pDMs.push(up > dn && up > 0 ? up : 0);
        mDMs.push(dn > up && dn > 0 ? dn : 0);
        trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1])));
      }
      let sTR = trs.slice(0, period).reduce((a, b) => a + b, 0);
      let sPDM = pDMs.slice(0, period).reduce((a, b) => a + b, 0);
      let sMDM = mDMs.slice(0, period).reduce((a, b) => a + b, 0);
      let pDI = sTR > 0 ? sPDM / sTR * 100 : 0, mDI = sTR > 0 ? sMDM / sTR * 100 : 0;
      const dxArr = [(pDI + mDI) > 0 ? Math.abs(pDI - mDI) / (pDI + mDI) * 100 : 0];
      for (let i = period; i < trs.length; i++) {
        sTR = sTR - sTR / period + trs[i]; sPDM = sPDM - sPDM / period + pDMs[i]; sMDM = sMDM - sMDM / period + mDMs[i];
        pDI = sTR > 0 ? sPDM / sTR * 100 : 0; mDI = sTR > 0 ? sMDM / sTR * 100 : 0;
        dxArr.push((pDI + mDI) > 0 ? Math.abs(pDI - mDI) / (pDI + mDI) * 100 : 0);
      }
      let adx = dxArr.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < dxArr.length; i++) adx = (adx * (period - 1) + dxArr[i]) / period;
      return { adx, plusDI: pDI, minusDI: mDI };
    }

    function calcRSI(data, period = 14) {
      if (data.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const d = data[i] - data[i - 1];
        d >= 0 ? (gains += d) : (losses -= d);
      }
      let ag = gains / period, al = losses / period;
      for (let i = period + 1; i < data.length; i++) {
        const d = data[i] - data[i - 1];
        ag = (ag * (period - 1) + Math.max(d, 0)) / period;
        al = (al * (period - 1) + Math.max(-d, 0)) / period;
      }
      return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }

    function calcATR(highs, lows, closes, period = 14) {
      if (highs.length < 2) return 0.01;
      const trs = [];
      for (let i = 1; i < highs.length; i++) {
        trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1])));
      }
      if (trs.length < period) {
        return trs.reduce((a, b) => a + b, 0) / trs.length;
      }
      let atr = trs.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < trs.length; i++) {
        atr = (atr * (period - 1) + trs[i]) / period;
      }
      return Math.max(0.01, atr);
    }

    function fmt(n) { return parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtVol(n) { if (n >= 1e7) return (n / 1e7).toFixed(2) + 'Cr'; if (n >= 1e5) return (n / 1e5).toFixed(2) + 'L'; return n.toLocaleString('en-IN'); }

    // Table Row Generator
    function tRow(metric, value, valClass, logic, trClass = "") {
      return `<tr class="${trClass}">
    <td class="col-metric">${metric}</td>
    <td class="col-value ${valClass}">${value}</td>
    <td class="col-logic">${logic}</td>
  </tr>`;
    }

    // Dynamic Market State Evaluator (IST specific)
    function isMarketOpen() {
      const now = new Date();
      const istTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const day = istTime.getDay(); // 0 = Sunday, 1 = Monday
      const hours = istTime.getHours();
      const minutes = istTime.getMinutes();

      const timeInMinutes = (hours * 60) + minutes;
      const isWeekday = day >= 1 && day <= 5;
      return isWeekday && (timeInMinutes >= 555) && (timeInMinutes < 930);
    }

    function getMarketStatusHTML() {
      if (isMarketOpen()) {
        return `<span style="color: #4ade80;">🟢 <b>Live Market Stream Active</b></span> &nbsp;·&nbsp; Real-time pricing via Yahoo Finance`;

      }
    }

    async function fetchStock() {

        for (let i = 0; i < rawC.length; i++) {

          }
        }

        if (close.length === 0) throw new Error(`No historical intraday price points found for "${sym}".`);

        let ltp = meta.regularMarketPrice ?? close.at(-1);
        const exchange = meta.exchangeName || 'NSE';
        const fullName = meta.longName || meta.shortName || sym;

        // 1. Get initial fallbacks from intraday data
        let prevClose = meta.previousClose ?? meta.regularMarketPreviousClose ?? meta.chartPreviousClose ?? close[0];
        let dayOpen = open[0]; // fallback to first 5m candle open
        let dayHigh = meta.regularMarketDayHigh ?? Math.max(...high.slice(-75));
        let dayLow = meta.regularMarketDayLow ?? Math.min(...low.slice(-75));
        let totalVol = meta.regularMarketVolume ?? vol.slice(-75).reduce((a, b) => a + b, 0);

        // 2. Override with official daily historical data if available
        let prevH = dayHigh, prevL = dayLow, prevC = prevClose;
        let dailyAtr = 0;
        let fiftyTwoWeekHigh = dayHigh;
        let fiftyTwoWeekLow = dayLow;
        const dC = [], dH = [], dL = [], dO = [], dV = [], dTS = [];
        if (dailyJson && dailyJson.chart.result[0].indicators.quote[0]) {
          const dq = dailyJson.chart.result[0].indicators.quote[0];

          const rDC = dq.close || [], rDH = dq.high || [], rDL = dq.low || [], rDO = dq.open || [], rDV = dq.volume || [];
          const rTS = dailyJson.chart.result[0].timestamp || [];
          for (let i = 0; i < rDC.length; i++) {
            if (rDC[i] != null && rDH[i] != null && rDL[i] != null && rDO[i] != null && rDV[i] != null && rDV[i] > 0) {
              dC.push(rDC[i]); dH.push(rDH[i]); dL.push(rDL[i]); dO.push(rDO[i]); dV.push(rDV[i]); dTS.push(rTS[i]);
            }
          }

          let todayCandleIsPresent = false;
          if (dTS.length >= 1) {
            const dailyDateStr = new Date(dTS.at(-1) * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' });
            const lastIntraTs = meta.regularMarketTime || (timestamps.length > 0 ? timestamps.at(-1) : Math.floor(Date.now() / 1000));
            const intraDateStr = new Date(lastIntraTs * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' });
            todayCandleIsPresent = (dailyDateStr === intraDateStr);
          }

          if (dC.length >= 1) {
            if (todayCandleIsPresent) {
              dayOpen = dO.at(-1);
              dayHigh = dH.at(-1);
              dayLow = dL.at(-1);
              totalVol = dV.at(-1);
              // Sync with custom LTP override and enforce high/low consistency
              dC[dC.length - 1] = ltp;
              dH[dH.length - 1] = Math.max(dH[dH.length - 1], ltp);
              dL[dL.length - 1] = Math.min(dL[dL.length - 1], ltp);
            } else {
              // Today's candle is not in dailyJson yet, append daily candle for today
              dC.push(ltp);
              dH.push(Math.max(dayHigh, ltp));
              dL.push(Math.min(dayLow, ltp));
              dO.push(dayOpen);
              dV.push(totalVol);
              dTS.push(Math.floor(Date.now() / 1000));
            }

            fiftyTwoWeekHigh = Math.max(...dH, dayHigh, ltp);
            fiftyTwoWeekLow = Math.min(...dL, dayLow, ltp);
          }
          if (dC.length >= 2) {
            prevH = dH.at(-2);
            prevL = dL.at(-2);
            prevC = dC.at(-2);
            prevClose = dC.at(-2);
          }
          if (dC.length >= 15) {
            dailyAtr = calcATR(dH, dL, dC, 14);
          }
        }

        // 3. Dynamic Circuit Limit Auto-detection Heuristic
        let circuitLimitPct = 10; // Default fallback
        let maxObservedMove = 0;
        if (dC.length > 1) {
          for (let i = 1; i < dC.length; i++) {
            const prevDayC = dC[i - 1];
            if (!prevDayC || prevDayC <= 0) continue;
            const hVal = dH[i] ?? prevDayC;
            const lVal = dL[i] ?? prevDayC;
            const cVal = dC[i] ?? prevDayC;

            const hPct = ((hVal - prevDayC) / prevDayC) * 100;
            const lPct = ((prevDayC - lVal) / prevDayC) * 100;
            const cPct = Math.abs(cVal - prevDayC) / prevDayC * 100;

            maxObservedMove = Math.max(maxObservedMove, hPct, lPct, cPct);
          }
        }

        let currentMove = 0;
        if (prevClose && prevClose > 0) {
          const highMove = ((dayHigh - prevClose) / prevClose) * 100;
          const lowMove = ((prevClose - dayLow) / prevClose) * 100;
          const ltpMove = Math.abs(ltp - prevClose) / prevClose * 100;
          currentMove = Math.max(highMove, lowMove, ltpMove);
        }

        const finalMaxMove = Math.max(maxObservedMove, currentMove);

        if (finalMaxMove > 10.05) {
          circuitLimitPct = 20;
        } else if (finalMaxMove > 5.05) {
          circuitLimitPct = 10;
        } else if (finalMaxMove > 2.05) {
          circuitLimitPct = 5;
        } else {
          circuitLimitPct = 10;
        }

        // 4. Round circuit limits to nearest 0.05 tick size
        // Upper Circuit: floor to nearest 0.05
        // Lower Circuit: ceil to nearest 0.05
        const ucRaw = prevClose * (1 + circuitLimitPct / 100);
        const lcRaw = prevClose * (1 - circuitLimitPct / 100);
        const upperCircuit = Math.floor(Math.round(ucRaw * 100) / 5) * 5 / 100;
        const lowerCircuit = Math.ceil(Math.round(lcRaw * 100) / 5) * 5 / 100;

        const change = ((ltp - prevClose) / prevClose * 100);

        const PP = (prevH + prevL + prevC) / 3;
        const R1 = (2 * PP) - prevL;
        const S1 = (2 * PP) - prevH;
        const R2 = PP + (prevH - prevL);
        const S2 = PP - (prevH - prevL);
        const R3 = prevH + 2 * (PP - prevL);
        const S3 = prevL - 2 * (prevH - PP);
        const R4 = prevH + 3 * (PP - prevL);
        const R5 = prevH + 4 * (PP - prevL);
        const R6 = prevH + 5 * (PP - prevL);
        const S4 = prevL - 3 * (prevH - PP);
        const S5 = prevL - 4 * (prevH - PP);
        const S6 = prevL - 5 * (prevH - PP);

        let pv = 0, tv = 0;
        if (timestamps.length > 0) {
          const lastTs = timestamps.at(-1);
          const lastDateStr = new Date(lastTs * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' });

          for (let i = 0; i < close.length; i++) {
            const candleDateStr = new Date(timestamps[i] * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' });
            if (candleDateStr === lastDateStr) {
              pv += close[i] * vol[i];
              tv += vol[i];
            }
          }
        }
        const vwap = tv > 0 ? pv / tv : ltp;

        const rsi = calcRSI(close, 14);
        const ema20 = calcEMA(close, 20);
        const ema50 = calcEMA(close, 50);
        const atr = Math.max(0.01, calcATR(high, low, close, 14));
        if (dailyAtr === 0) dailyAtr = atr * 15; // fallback to daily ATR (e.g. 15x of 5m ATR) if dailyData fails

        const fvLower = vwap - (dailyAtr * 0.5);
        const fvUpper = vwap + (dailyAtr * 0.5);

        let avgVol20 = 0;
        if (dailyJson && dV.length > 1) {
          // Exclude today's current volume (last index) to avoid incomplete session bias

        } else if (dV.length === 1) {

        const volRatio = avgVol20 > 0 ? (totalVol / avgVol20) : 0;

        // Daily Indicators: MACD, Supertrend, Bollinger Bands, ADX

          verdictLogic = 'Mixed technical signals. Wait for a clear breakout above resistance, a bounce from support, or increased volume before entering.';

        // Daily Verdict Scores (Dynamic Bullish/Bearish Direction)

        // 2. EMA Trend Check

        if (dailyEmaTrend === 'Strong Downtrend' || dailyEmaTrend === 'Bearish (20/50 Daily)') dailyBearishScore++;

        // 5. Volume Confirmation Check

        let dailyVerdictVal, dailyVerdictClass, dailyVerdictLogic, dailyDirection;

          dailyVerdictLogic = isDailyTrending
