            : 'Ranging market conditions. High probability mean-reversion buy setup. Accumulating long positions from support floors.';
          dailyDirection = 'Long';
        } else if (dailyBearishScore >= 4) {
          dailyVerdictVal = `STRONG SHORT (${dailyBearishScore}/5)`;
          dailyVerdictClass = 'red';
          dailyVerdictLogic = isDailyTrending
            ? 'High probability daily momentum breakdown setup. Downward structure, bearish EMAs, and volume parameters validate a short entry below support.'
            : 'Ranging market conditions. High probability mean-reversion short setup. Selling pullbacks near key resistance ceilings.';
          dailyDirection = 'Short';
        } else {
          dailyVerdictVal = `NEUTRAL / WAIT (${dailyBullishScore}L / ${dailyBearishScore}S)`;
          dailyVerdictClass = 'amber';
          dailyVerdictLogic = 'Mixed daily technical signals. Wait for a clear breakout above daily resistance ceilings or stabilization near support floors.';
          dailyDirection = dailyBullishScore >= dailyBearishScore ? 'Long' : 'Short';
        }

        // Dynamic Trade Levels calculations based on trade direction
        const intraSl = intraDirection === 'Short' ? ltp + 1.5 * atr : ltp - 1.5 * atr;
        const intraT1 = intraDirection === 'Short' ? ltp - 1.5 * atr : ltp + 1.5 * atr;
        const intraT2 = intraDirection === 'Short' ? ltp - 2.5 * atr : ltp + 2.5 * atr;
        const intraRr = intraDirection === 'Short'
          ? ((intraSl - ltp) > 0 ? ((ltp - intraT2) / (intraSl - ltp)) : 0)
          : ((ltp - intraSl) > 0 ? ((intraT2 - ltp) / (ltp - intraSl)) : 0);

        const dailySl = dailyDirection === 'Short' ? ltp + 1.5 * dailyAtr : ltp - 1.5 * dailyAtr;
        const dailyT1 = dailyDirection === 'Short' ? ltp - 1.5 * dailyAtr : ltp + 1.5 * dailyAtr;
        const dailyT2 = dailyDirection === 'Short' ? ltp - 2.5 * dailyAtr : ltp + 2.5 * dailyAtr;
        const dailyRr = dailyDirection === 'Short'
          ? ((dailySl - ltp) > 0 ? ((ltp - dailyT2) / (dailySl - ltp)) : 0)
          : ((ltp - dailySl) > 0 ? ((dailyT2 - ltp) / (ltp - dailySl)) : 0);

        // --- TIER 1 INDICATORS: GAP, FIBONACCI, MACD, SUPERTREND, BB, ADX ---
        // Gap Analysis
        const gap = dayOpen - prevClose;
        const gapPct = prevClose > 0 ? (gap / prevClose * 100) : 0;
        const gapClass = gapPct > 0.5 ? 'green' : gapPct < -0.5 ? 'red' : 'white';
        const gapLabel = gapPct > 0.5 ? 'Gap Up' : gapPct < -0.5 ? 'Gap Down' : 'Flat Open';
        const gapLogic = gapPct > 0.5
          ? `Stock opened ${gapPct.toFixed(2)}% above previous close. Bullish gap — early buyers have the advantage. Watch for gap-fill pullback to ₹${fmt(prevClose)}.`
          : gapPct < -0.5
            ? `Stock opened ${Math.abs(gapPct).toFixed(2)}% below previous close. Bearish gap — sellers in control from the open. Watch for gap-fill recovery to ₹${fmt(prevClose)}.`
            : `Stock opened within 0.5% of previous close (₹${fmt(prevClose)}). No significant gap — price discovery ongoing.`;

        // Fibonacci Retracement (from the current intraday session's range)
        const fibRange = dayHigh - dayLow;
        const fib236 = dayLow + 0.764 * fibRange; // 23.6% retracement from high (76.4% from low)
        const fib382 = dayLow + 0.618 * fibRange; // 38.2% retracement from high (61.8% from low)
        const fib500 = dayLow + 0.500 * fibRange; // 50.0% retracement
        const fib618 = dayLow + 0.382 * fibRange; // 61.8% retracement from high (38.2% from low)
        const fib786 = dayLow + 0.214 * fibRange; // 78.6% retracement from high (21.4% from low)

        // 5M Indicators: MACD, Supertrend, Bollinger Bands, ADX
        const intraMACD = calcMACD(close);
        const intraST = calcSupertrend(high, low, close, 10, 3);
        const intraBB = calcBollingerBands(close, 20);
        const intraADX = calcADX(high, low, close, 14);



        // --- 3-DAY VOLATILITY RISK CONE PROJECTION ---
        const now = new Date();
        const istTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));

        let projectionTableRows = '';
        let daysAdded = 0;
        let currentIterDate = new Date(istTime);
        let validTradingDays = 1; // Used for Square Root of Time calculation

        while (daysAdded < 3) {
          const dayOfWeek = currentIterDate.getDay();
          if (dayOfWeek !== 0 && dayOfWeek !== 6) {
            const dateStr = currentIterDate.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });

            let label = dateStr;
            if (daysAdded === 0) label = `Today (${dateStr})`;

            // Random Walk Volatility Cone: scales by the square root of time
            const expectedMove = dailyAtr * Math.sqrt(validTradingDays);
            const expectedHigh = ltp + expectedMove;
            const expectedLow = ltp - expectedMove;

            let logicText = `There is a 68% statistical probability (1 Std Dev) that price remains inside this cone.`;
            if (daysAdded === 0) logicText = `Current session boundaries. Expected to trade within 1x ATR.`;

            projectionTableRows += tRow(
              label,
              `<span class="green">High: ₹${fmt(expectedHigh)}</span><br><span class="red">Low: ₹${fmt(expectedLow)}</span>`,
              '',
              logicText
            );

            validTradingDays++;
            daysAdded++;
          }
          currentIterDate.setDate(currentIterDate.getDate() + 1);
        }

        const changeClass = change >= 0 ? 'green' : 'red';
        const changeSign = change >= 0 ? '+' : '';

        let volLogic = `Normal volume (${volRatio.toFixed(1)}x avg). Standard market participation.`;
        let volClass = 'white';
        if (volRatio >= 1.0) { volLogic = `Healthy volume (${volRatio.toFixed(1)}x avg). Active institutional participation detected.`; volClass = 'green'; }
        if (volRatio < 0.5) { volLogic = `Low volume (${volRatio.toFixed(1)}x avg). Prone to erratic spikes or false breakouts.`; volClass = 'red'; }

        let rsiLogic = "Momentum is healthy. Asset is gaining strength without being overvalued.";
        let rsiClass = 'green';
        if (rsi > 70) { rsiLogic = "Asset is currently overbought. High risk of a short-term pullback."; rsiClass = 'amber'; }
        if (rsi < 40) { rsiLogic = "Bearish momentum or oversold. Weak conditions for a long entry."; rsiClass = 'red'; }

        let dailyRsiLogic = "Momentum is healthy. Daily chart shows strength without being overvalued.";
        let dailyRsiClass = 'green';
        if (dailyRsi > 70) { dailyRsiLogic = "Daily RSI is overbought (>70). High risk of long-term exhaustion."; dailyRsiClass = 'amber'; }
        if (dailyRsi < 40) { dailyRsiLogic = "Daily RSI is bearish (<40), indicating clear downtrend momentum."; dailyRsiClass = 'red'; }

        // Dynamic Zone-based Pivot Trade Levels for Daily (1D) Strategy
        let pivotLongTrigger, pivotLongSl, pivotLongT1, pivotLongT2;
        const rRange = R3 - R2; // Range unit for levels beyond standard pivots
        const sRange = S2 - S3; // Range unit for levels beyond standard pivots
        const isTrending = dailyADXData.adx >= 20;

        if (!isTrending) {
          // Ranging Market Regime (Mean Reversion / Support Buy / Bounce)
          if (ltp <= S3) {
            pivotLongTrigger = S2;
            pivotLongSl = S3;
            pivotLongT1 = S1;
            pivotLongT2 = PP;
          } else if (ltp <= S1 && ltp > S3) {
            // Reclaim S1 breakout (Conservative Entry for ranging)
            pivotLongTrigger = S1;
            pivotLongSl = S2;
            pivotLongT1 = PP;
            pivotLongT2 = R1;
          } else if (ltp <= PP && ltp > S1) {
            pivotLongTrigger = PP;
            pivotLongSl = S1;
            pivotLongT1 = R1;
            pivotLongT2 = R2;
          } else if (ltp <= R1 && ltp > PP) {
            pivotLongTrigger = R1;
            pivotLongSl = PP;
            pivotLongT1 = R2;
            pivotLongT2 = R3;
          } else if (ltp <= R2 && ltp > R1) {
            pivotLongTrigger = R2;
            pivotLongSl = R1;
            pivotLongT1 = R3;
            pivotLongT2 = R3 + rRange;
          } else {
            // ltp > R2
            pivotLongTrigger = R3;
            pivotLongSl = R2;
            pivotLongT1 = R3 + rRange;
            pivotLongT2 = R3 + 2 * rRange;
          }
        } else {
          // Trending Market Regime (Momentum Breakout)
          if (ltp < PP) {
            pivotLongTrigger = PP;
            pivotLongSl = S1;
            pivotLongT1 = R1;
            pivotLongT2 = R2;
          } else if (ltp >= PP && ltp < R1) {
            pivotLongTrigger = R1;
            pivotLongSl = PP;
            pivotLongT1 = R2;
            pivotLongT2 = R3;
          } else if (ltp >= R1 && ltp < R2) {
            pivotLongTrigger = R2;
            pivotLongSl = R1;
            pivotLongT1 = R3;
            pivotLongT2 = R3 + rRange;
          } else {
            // ltp >= R2
            pivotLongTrigger = R3;
            pivotLongSl = R2;
            pivotLongT1 = R3 + rRange;
            pivotLongT2 = R3 + 2 * rRange;
          }
        }
        const pivotLongRr = (pivotLongTrigger - pivotLongSl) > 0 ? (pivotLongT2 - pivotLongTrigger) / (pivotLongTrigger - pivotLongSl) : 1.67;

        let pivotShortTrigger, pivotShortSl, pivotShortT1, pivotShortT2;

        if (!isTrending) {
          // Ranging Market Regime (Mean Reversion / Resistance Sell / Reject)
          if (ltp >= R3) {
            pivotShortTrigger = R3;
            pivotShortSl = R3 + rRange;
            pivotShortT1 = R2;
            pivotShortT2 = R1;
          } else if (ltp >= R2 && ltp < R3) {
            pivotShortTrigger = R2;
            pivotShortSl = R3;
            pivotShortT1 = R1;
            pivotShortT2 = PP;
          } else if (ltp >= R1 && ltp < R2) {
            pivotShortTrigger = R1;
            pivotShortSl = R2;
            pivotShortT1 = PP;
            pivotShortT2 = S1;
          } else if (ltp >= PP && ltp < R1) {
            pivotShortTrigger = PP;
            pivotShortSl = R1;
            pivotShortT1 = S1;
            pivotShortT2 = S2;
          } else if (ltp >= S1 && ltp < PP) {
            pivotShortTrigger = S1;
            pivotShortSl = PP;
            pivotShortT1 = S2;
            pivotShortT2 = S3;
          } else if (ltp >= S2 && ltp < S1) {
            pivotShortTrigger = S2;
            pivotShortSl = S1;
            pivotShortT1 = S3;
            pivotShortT2 = S3 - sRange;
          } else {
            // ltp < S2
            pivotShortTrigger = S3;
            pivotShortSl = S2;
            pivotShortT1 = S3 - sRange;
            pivotShortT2 = S3 - 2 * sRange;
          }
        } else {
          // Trending Market Regime (Momentum Breakdown)
          if (ltp > PP) {
            pivotShortTrigger = PP;
            pivotShortSl = R1;
            pivotShortT1 = S1;
            pivotShortT2 = S2;
          } else if (ltp <= PP && ltp > S1) {
            pivotShortTrigger = S1;
            pivotShortSl = PP;
            pivotShortT1 = S2;
            pivotShortT2 = S3;
          } else if (ltp <= S1 && ltp > S2) {
            pivotShortTrigger = S2;
            pivotShortSl = S1;
            pivotShortT1 = S3;
            pivotShortT2 = S3 - sRange;
          } else {
            // ltp <= S2
            pivotShortTrigger = S3;
            pivotShortSl = S2;
            pivotShortT1 = S3 - sRange;
            pivotShortT2 = S3 - 2 * sRange;
          }
        }
        const pivotShortRr = (pivotShortSl - pivotShortTrigger) > 0 ? (pivotShortTrigger - pivotShortT2) / (pivotShortSl - pivotShortTrigger) : 1.67;

        // Populate global state
        activeStockData = {
          ltp, totalVol, volRatio,
          fiftyTwoWeekHigh, fiftyTwoWeekLow,
          gap: { amount: gap, pct: gapPct, label: gapLabel, cls: gapClass, logic: gapLogic },
          fib: { high: dayHigh, low: dayLow, f236: fib236, f382: fib382, f500: fib500, f618: fib618, f786: fib786 },
          pivots: { PP, R1, S1, R2, S2, R3, S3, R4, R5, R6, S4, S5, S6, high: dayHigh, low: dayLow },
          intra: {
            vwap,
            emaTrend: ema20 > ema50 ? 'Bullish' : 'Bearish',
            emaClass: ema20 > ema50 ? 'green' : 'red',
            emaLogic: ema20 > ema50 ? 'Short-term (20 EMA) is above medium-term (50 EMA) on the 5M chart, confirming an uptrend.' : 'Short-term (20 EMA) is below medium-term (50 EMA) on the 5M chart, indicating a downtrend.',
            rsi, rsiClass, rsiLogic,
            atr, atrLogic: `Average 5-minute candle volatility is ~₹${fmt(atr)}. Expect normal price swings of this size.`,
            volClass, volLogic,
            macd: intraMACD,
            supertrend: intraST,
            bb: intraBB,
            adx: intraADX,
            tradeLevels: {
              verdictVal, verdictClass, verdictLogic, direction: intraDirection,
              long: { trigger: ltp + 0.5 * atr, sl: ltp - 1.0 * atr, t1: ltp + 2.0 * atr, t2: ltp + 3.0 * atr, rr: 1.67 },
              short: { trigger: ltp - 0.5 * atr, sl: ltp + 1.0 * atr, t1: ltp - 2.0 * atr, t2: ltp - 3.0 * atr, rr: 1.67 }
            }
          },
          daily: {
            vwap,
            emaTrend: dailyEmaTrend, emaClass: dailyEmaClass, emaLogic: dailyEmaLogic,
            rsi: dailyRsi, rsiClass: dailyRsiClass, rsiLogic: dailyRsiLogic,
            atr: dailyAtr, atrLogic: `Average daily volatility is ~₹${fmt(dailyAtr)}. Standard daily price range.`,
            volClass, volLogic,
            macd: dailyMACD,
            supertrend: dailyST,
            bb: dailyBB,
            adx: dailyADXData,
            tradeLevels: {
              verdictVal: dailyVerdictVal, verdictClass: dailyVerdictClass, verdictLogic: dailyVerdictLogic, direction: dailyDirection,
              long: { trigger: pivotLongTrigger, sl: pivotLongSl, t1: pivotLongT1, t2: pivotLongT2, rr: pivotLongRr },
              short: { trigger: pivotShortTrigger, sl: pivotShortSl, t1: pivotShortT1, t2: pivotShortT2, rr: pivotShortRr }
            }
          }
        };

        // Dynamic labels and descriptions for daily pivots based on price polarity
        const r3Label = ltp >= R3 ? 'R3 Support (Broken)' : 'Resistance 3';
        const r3Class = ltp >= R3 ? 'green' : 'red';
        const r3Desc = ltp >= R3 ? 'Broken resistance. Expected to act as support on pullbacks (polarity swap).' : 'Extreme structural ceiling. Indicates massive bullish momentum if breached.';

        const r2Label = ltp >= R2 ? 'R2 Support (Broken)' : 'Resistance 2';
        const r2Class = ltp >= R2 ? 'green' : 'red';
        const r2Desc = ltp >= R2 ? 'Broken resistance. Expected to act as support on pullbacks (polarity swap).' : 'Secondary ceiling. Common profit-taking zone in an uptrend.';

        const r1Label = ltp >= R1 ? 'R1 Support (Broken)' : 'Resistance 1';
        const r1Class = ltp >= R1 ? 'green' : 'red';
        const r1Desc = ltp >= R1 ? 'Broken resistance. Expected to act as support on pullbacks (polarity swap).' : 'Primary resistance. The first major hurdle where selling pressure generally increases.';

        const s1Label = ltp <= S1 ? 'S1 Resist (Broken)' : 'Support 1';
        const s1Class = ltp <= S1 ? 'red' : 'green';
        const s1Desc = ltp <= S1 ? 'Broken support floor. Expected to act as resistance on rallies (polarity swap).' : 'Primary support. The first major floor where buyers are expected to step in.';

        const s2Label = ltp <= S2 ? 'S2 Resist (Broken)' : 'Support 2';
        const s2Class = ltp <= S2 ? 'red' : 'green';
        const s2Desc = ltp <= S2 ? 'Broken support floor. Expected to act as resistance on rallies (polarity swap).' : 'Secondary support. Acts as a strong historical bounce zone.';

        const s3Label = ltp <= S3 ? 'S3 Resist (Broken)' : 'Support 3';
        const s3Class = ltp <= S3 ? 'red' : 'green';
        const s3Desc = ltp <= S3 ? 'Broken support floor. Expected to act as resistance on rallies (polarity swap).' : 'Extreme floor. Indicates massive selling pressure if price falls below this line.';

        let fvDesc = 'Daily equilibrium zone based on VWAP and daily volatility. Price tends to revert to this channel.';
        if (ltp > fvUpper) {
          fvDesc = 'Daily equilibrium zone based on VWAP and daily volatility. Price is currently trading ABOVE this range (Bullish Expansion).';
        } else if (ltp < fvLower) {
          fvDesc = 'Daily equilibrium zone based on VWAP and daily volatility. Price is currently trading BELOW this range (Bearish Expansion).';
        }

        statusEl.style.display = 'none';

        outputEl.innerHTML = `
      <div class="report-header">
        <div class="ticker-info">
          <h2>${sym}<span class="groww-link" title="Open on Groww" onclick="openGroww(event, '${sym}')" style="font-size: 14px; vertical-align: middle; margin-left: 8px; cursor: pointer;">↗</span></h2>
          <span>${fullName} &nbsp;|&nbsp; ${exchange}</span>
        </div>
        <div class="price-info">
          <div class="ltp ${changeClass}">₹${fmt(ltp)}</div>
          <div class="change ${changeClass}">${changeSign}${change.toFixed(2)}%</div>
        </div>
      </div>

      <div class="session-grid">
        <div><span class="lbl">Open</span><span class="val">₹${fmt(dayOpen)}</span></div>
        <div><span class="lbl">High</span><span class="val green">₹${fmt(dayHigh)}</span></div>
        <div><span class="lbl">Low</span><span class="val red">₹${fmt(dayLow)}</span></div>
        <div><span class="lbl">Prev Close</span><span class="val">₹${fmt(prevClose)}</span></div>
        <div><span class="lbl">Gap</span><span class="val ${gapClass}">${gapPct >= 0 ? '+' : ''}${gapPct.toFixed(2)}% &nbsp;<small style="font-size:10px;font-weight:500;">${gapLabel}</small></span></div>
        <div><span class="lbl">Upper Circuit (${circuitLimitPct}%)</span><span class="val green">₹${fmt(upperCircuit)}</span></div>
        <div><span class="lbl">Lower Circuit (${circuitLimitPct}%)</span><span class="val red">₹${fmt(lowerCircuit)}</span></div>
        <div><span class="lbl">52W High</span><span class="val green">₹${fmt(fiftyTwoWeekHigh)}</span></div>
        <div><span class="lbl">52W Low</span><span class="val red">₹${fmt(fiftyTwoWeekLow)}</span></div>
      </div>

      <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tab-analysis', this)">Technical Analysis</button>
        <button class="tab-btn" onclick="switchTab('tab-volatility', this)">Volatility Projection <span class="badge-experimental">Experimental</span></button>
      </div>

      <div id="tab-analysis" class="tab-content active">
        <h3>Indicators & Technical Verdict</h3>
        
        <div class="timeframe-toggle-container">
          <span>Strategy &amp; Timeframe:</span>
          <div class="toggle-group">
            <button class="toggle-btn active" id="tf-1d" onclick="setTimeframe('1d')">Day Trade &middot; Pivots (1D)</button>
            <button class="toggle-btn" id="tf-5m" onclick="setTimeframe('5m')">Scalp &middot; ATR (5M)</button>
          </div>
        </div>

        <table>
          <tbody id="indicators-table-body">
            <!-- Dynamic timeframe indicator table rows injected here -->
          </tbody>
        </table>

        <h3>Market Structure (SMC Daily Pivots)</h3>
        <table class="three-col-table">
          <thead>
            <tr>
              <th class="col-metric">Level</th>
              <th class="col-value">Value</th>
              <th class="col-logic">Market Structure Description</th>
            </tr>
          </thead>
          <tbody>
            ${tRow('Resist Ext (R4/5/6)', `₹${fmt(R4)} · ₹${fmt(R5)} · ₹${fmt(R6)}`, 'red', 'Macro breakout extension levels. Volatility targets for extreme trend days.')}
            ${tRow(r3Label, `₹${fmt(R3)}`, r3Class, r3Desc)}
            ${tRow(r2Label, `₹${fmt(R2)}`, r2Class, r2Desc)}
            ${tRow(r1Label, `₹${fmt(R1)}`, r1Class, r1Desc)}
            ${tRow('Pivot Point', `₹${fmt(PP)}`, 'amber', ltp >= PP ? 'Currently trading above the central pivot. The structural advantage belongs to buyers.' : 'Currently trading below the central pivot. The structural advantage belongs to sellers.')}
            ${tRow('Daily Value Area (DVA)', `₹${fmt(fvLower)} - ₹${fmt(fvUpper)}`, 'blue', fvDesc)}
            ${tRow(s1Label, `₹${fmt(S1)}`, s1Class, s1Desc)}
            ${tRow(s2Label, `₹${fmt(S2)}`, s2Class, s2Desc)}
            ${tRow(s3Label, `₹${fmt(S3)}`, s3Class, s3Desc)}
            ${tRow('Support Ext (S4/5/6)', `₹${fmt(S4)} · ₹${fmt(S5)} · ₹${fmt(S6)}`, 'green', 'Macro breakdown extension levels. Volatility floors for extreme dump days.')}
          </tbody>
        </table>

        <h3>Actionable Trade Levels Matrix</h3>
        <table>
          <thead>
            <tr>
              <th style="width: 15%;">Direction</th>
              <th style="width: 25%;">Entry Trigger</th>
              <th style="width: 15%;">Stop Loss (SL)</th>
              <th style="width: 15%;">Target 1</th>
              <th style="width: 15%;">Target 2</th>
              <th style="width: 15%;">Risk : Reward</th>
            </tr>
          </thead>
          <tbody id="trade-levels-table-body">
            <!-- Dynamic timeframe trade levels rows injected here -->
          </tbody>
        </table>

        <h3 id="fib-table-title">Fibonacci Retracement (Previous Session: ₹${fmt(activeStockData.fib.low)} – ₹${fmt(activeStockData.fib.high)})</h3>
        
        <div class="timeframe-toggle-container" style="margin-top: 10px; margin-bottom: 10px;">
          <span>Fibonacci Anchor Range:</span>
          <div class="toggle-group">
            <button class="toggle-btn active" id="fib-anchor-session" onclick="setFibAnchor('session')">Session Range (Micro)</button>
            <button class="toggle-btn" id="fib-anchor-macro" onclick="setFibAnchor('macro')">52-Week Range (Macro)</button>
          </div>
        </div>
        <p id="fib-description-text" style="font-size: 12.5px; color: #a1a1aa; margin-top: -5px; margin-bottom: 15px; line-height: 1.5; background: #111827; padding: 10px 12px; border-radius: 4px; border-left: 3px solid #fbbf24;">
          <b>Session Range (Micro):</b> Fibonacci retracements calculated from the high and low range of the most recent completed trading session. Utilized by intraday traders to identify short-term support, resistance, and short-covering pivot zones.
        </p>

        <table class="three-col-table">
          <thead>
            <tr>
              <th class="col-metric">Level</th>
              <th class="col-value">Price</th>
              <th class="col-logic">Retracement Role</th>
            </tr>
          </thead>
          <tbody id="fib-table-body">
            <!-- Dynamic anchor Fibonacci table rows injected here -->
          </tbody>
        </table>

        <div class="info-box" style="border-left-color: #fbbf24; margin-top: 15px; margin-bottom: 25px;">
          <h4>Trading Guide: Key Fibonacci Retracement Levels</h4>
          <p>Traders use Fibonacci levels to identify key support and resistance boundaries. Because the levels are plotted from 0% (Low) to 100% (High), they are interpreted based on price direction relative to the range:</p>
          <ul>
            <li><strong>61.8% & 38.2% Levels:</strong> Critical structural nodes. In a pullback from high, the 61.8% level (representing a 38.2% retracement distance) is key support. The 38.2% level (representing a 61.8% retracement distance) is the Golden Ratio pullback zone, which serves as a high-probability reversal entry area.</li>
            <li><strong>50.0% (Mid-Point):</strong> The equilibrium level. Price frequently consolidates or pauses at this mid-point to establish value before continuing its primary trend.</li>
            <li><strong>23.6% & 78.6% Levels:</strong> Structural boundaries. The 78.6% level (shallow 21.4% pullback from high) indicates strong continuation momentum. The 23.6% level (deep 76.4% pullback from high) is the final structural defense line for a trend before invalidation.</li>
          </ul>
          
          <div id="fib-guide-container">
            <!-- Dynamic anchor guide boxes injected here -->
          </div>
        </div>
      </div>

      <div id="tab-volatility" class="tab-content">
        <h3>Statistical 3-Day Risk Cone (Volatility Projection)</h3>
        <table class="three-col-table">
          <thead>
            <tr>
              <th class="col-metric">Date</th>
              <th class="col-value">Expected High & Low</th>
              <th class="col-logic">Predictive Logic & Range</th>
            </tr>
          </thead>
          <tbody>
            ${projectionTableRows}
          </tbody>
        </table>
        
        <div class="info-box" style="border-left-color: #fbbf24; margin-top: 20px;">
          <h4>🧪 Experimental Model Disclaimer</h4>
          <p>The Volatility Projection uses mathematical Average True Range (ATR) parameters scaled over time using the <b>Square Root of Time</b> rule (Random Walk model). It represents standard deviation-based boundaries (1 Std Dev / ~68% confidence interval).</p>
          <p style="color: #f87171; font-weight: 600; margin-top: 12px; margin-bottom: 0;">⚠️ Disclaimer: Projections are purely theoretical and do not guarantee actual outcome. Never use volatility cones as standalone financial signals.</p>
        </div>
      </div>

      <div class="footer-warning">
        ${getMarketStatusHTML()}
      </div>
    `;

        setTimeframe(selectedTimeframe);
        setFibAnchor(selectedFibAnchor);

      } catch (e) {
        statusEl.style.display = 'block';
        statusEl.className = 'error';
        statusEl.innerHTML = `Error: ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Analysis';
      }
    }

    // Parse query parameters on load to auto-load a stock and setup listeners
    window.addEventListener('DOMContentLoaded', () => {
      loadLocalStocks();
      initScanner();

      const params = new URLSearchParams(window.location.search);
      const symbol = params.get('symbol') || params.get('sym');
      if (symbol) {
        document.getElementById('sym').value = symbol.trim().toUpperCase();
        fetchStock();
      }

      // Input and Autocomplete Event Listeners
      const inputEl = document.getElementById('sym');
      const dropdownEl = document.getElementById('autocomplete-suggestions');
      if (!inputEl || !dropdownEl) return;

      const debouncedSuggest = debounce((val) => {
        fetchSuggestions(val);
      }, 250);

      inputEl.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val === '') {
          initScanner();
        }
        debouncedSuggest(e.target.value);
      });

      inputEl.addEventListener('keydown', (e) => {
        if (dropdownEl.style.display !== 'block') {
          if (e.key === 'Enter') {
            fetchStock();
          }
          return;
        }

        const items = dropdownEl.querySelectorAll('.autocomplete-item');
        if (items.length === 0) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
          updateActiveSuggestion(items);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
          updateActiveSuggestion(items);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (activeSuggestionIndex >= 0 && activeSuggestionIndex < items.length) {
            selectSuggestion(activeSuggestionIndex);
          } else {
            selectSuggestion(0); // select first item on Enter by default
          }
        } else if (e.key === 'Escape') {
          closeSuggestions();
        }
      });

      function updateActiveSuggestion(items) {
        items.forEach((item, idx) => {
          if (idx === activeSuggestionIndex) {
            item.classList.add('active');
            item.scrollIntoView({ block: 'nearest' });
          } else {
            item.classList.remove('active');
          }
        });
      }

      // Close autocomplete dropdown on click outside
      document.addEventListener('click', (e) => {
        if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) {
          closeSuggestions();
        }
      });

      // TradingView-style global typing trigger
      document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        if (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable) return;
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key.length !== 1) return;

        // Start typing if alphanumeric key is pressed
        if (/^[a-zA-Z0-9/]$/.test(e.key)) {
          e.preventDefault();
          inputEl.focus();
          inputEl.value = e.key;
          fetchSuggestions(e.key);
        }
      });
    });
  </script>
</body>
